<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>매출 현황 차트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
      background: #f0f4f8;
      color: #1e293b;
      padding: 0 24px 32px;
    }

    /* ── Page nav ── */
    .page-nav {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 0 24px;
      margin: 0 -24px;
      display: flex;
      align-items: stretch;
      gap: 2px;
      position: sticky;
      top: 0;
      z-index: 100;
      overflow-x: auto;
      scrollbar-width: none;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .page-nav::-webkit-scrollbar { display: none; }
    .page-nav a {
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      color: #64748b;
      padding: 0 18px;
      height: 44px;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color 0.18s, background 0.18s, border-color 0.18s;
    }
    .page-nav a:hover  { color: #3b5bdb; background: rgba(59,91,219,0.06); }
    .page-nav a.active { color: #3b5bdb; font-weight: 700; border-bottom-color: #3b5bdb; background: rgba(59,91,219,0.07); }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      color: #0f4c75;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 32px;
    }

    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
    }

    @media (max-width: 780px) {
      .charts-grid { grid-template-columns: 1fr; }
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(15, 76, 117, 0.08);
    }

    .card h2 {
      font-size: 1rem;
      color: #0f4c75;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #e0f0ff;
    }

    canvas {
      display: block;
      width: 100% !important;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: #475569;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-rect {
      width: 14px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      max-width: 1100px;
      margin: 0 auto 24px;
    }

    .stat-card {
      background: #fff;
      border-radius: 12px;
      padding: 18px 20px;
      box-shadow: 0 2px 8px rgba(15, 76, 117, 0.07);
      border-left: 4px solid #1a78c2;
    }

    .stat-card.green { border-left-color: #1a9c5a; }
    .stat-card.teal  { border-left-color: #0d8f8f; }

    .stat-label { font-size: 0.78rem; color: #64748b; margin-bottom: 4px; }
    .stat-value { font-size: 1.25rem; font-weight: 700; color: #0f4c75; }
  </style>
</head>
<body>

<nav class="page-nav" id="pageNav">
  <a href="dashboard.html">🏠 대시보드</a>
  <a href="meeting-result.html">📝 회의록</a>
  <a href="chart.html">📊 매출 현황</a>
  <a href="diagram.svg">🔄 업무 프로세스</a>
  <a href="report.html">🔍 사이트 분석</a>
</nav>

<h1 style="margin-top:32px">매출 현황 대시보드</h1>
<p class="subtitle">데이터 기준: 2026년 1월 ~ 2월</p>

<div class="summary" id="summary"></div>

<div class="charts-grid">
  <div class="card">
    <h2>📈 월별 매출 추이</h2>
    <canvas id="lineChart" height="260"></canvas>
    <div class="legend" id="lineLegend"></div>
  </div>
  <div class="card">
    <h2>📊 제품별 매출 비교</h2>
    <canvas id="barChart" height="260"></canvas>
    <div class="legend" id="barLegend"></div>
  </div>
</div>

<script>
// ── 원본 CSV 데이터 ──────────────────────────────────────────────
const CSV = `날짜,제품,카테고리,수량,단가,매출액,지역
2026-01-05,무선 이어폰,전자기기,45,89000,4005000,서울
2026-01-05,보조배터리,전자기기,32,35000,1120000,서울
2026-01-05,텀블러,생활용품,78,25000,1950000,부산
2026-01-08,무선 이어폰,전자기기,52,89000,4628000,서울
2026-01-08,블루투스 스피커,전자기기,18,120000,2160000,대구
2026-01-08,텀블러,생활용품,65,25000,1625000,서울
2026-01-12,보조배터리,전자기기,41,35000,1435000,부산
2026-01-12,무선 충전기,전자기기,29,45000,1305000,서울
2026-01-12,에코백,생활용품,93,15000,1395000,대구
2026-01-15,무선 이어폰,전자기기,38,89000,3382000,부산
2026-01-15,블루투스 스피커,전자기기,22,120000,2640000,서울
2026-01-15,텀블러,생활용품,84,25000,2100000,서울
2026-01-19,보조배터리,전자기기,55,35000,1925000,대구
2026-01-19,에코백,생활용품,110,15000,1650000,서울
2026-01-19,무선 충전기,전자기기,33,45000,1485000,부산
2026-01-22,무선 이어폰,전자기기,61,89000,5429000,서울
2026-01-22,텀블러,생활용품,72,25000,1800000,대구
2026-01-22,블루투스 스피커,전자기기,15,120000,1800000,부산
2026-01-26,보조배터리,전자기기,48,35000,1680000,서울
2026-01-26,에코백,생활용품,88,15000,1320000,서울
2026-01-26,무선 충전기,전자기기,37,45000,1665000,대구
2026-02-01,무선 이어폰,전자기기,70,89000,6230000,서울
2026-02-01,텀블러,생활용품,95,25000,2375000,부산
2026-02-01,보조배터리,전자기기,43,35000,1505000,서울
2026-02-05,블루투스 스피커,전자기기,25,120000,3000000,서울
2026-02-05,에코백,생활용품,120,15000,1800000,대구
2026-02-05,무선 충전기,전자기기,31,45000,1395000,부산
2026-02-10,무선 이어폰,전자기기,58,89000,5162000,대구
2026-02-10,텀블러,생활용품,67,25000,1675000,서울
2026-02-10,보조배터리,전자기기,39,35000,1365000,서울`;

// ── 파싱 ────────────────────────────────────────────────────────
const rows = CSV.trim().split('\n').slice(1).map(line => {
  const [날짜, 제품, 카테고리, 수량, 단가, 매출액, 지역] = line.split(',');
  return { 날짜, 제품, 카테고리, 수량: +수량, 단가: +단가, 매출액: +매출액, 지역 };
});

// ── 집계 ────────────────────────────────────────────────────────
const monthlyMap = {};
rows.forEach(r => {
  const m = r.날짜.slice(0, 7);
  monthlyMap[m] = (monthlyMap[m] || 0) + r.매출액;
});
const months = Object.keys(monthlyMap).sort();
const monthlyValues = months.map(m => monthlyMap[m]);

const productMap = {};
rows.forEach(r => {
  productMap[r.제품] = (productMap[r.제품] || 0) + r.매출액;
});
const products = Object.keys(productMap).sort((a, b) => productMap[b] - productMap[a]);
const productValues = products.map(p => productMap[p]);

const totalSales = rows.reduce((s, r) => s + r.매출액, 0);
const topProduct = products[0];

// ── 유틸 ────────────────────────────────────────────────────────
const fmt = n => n.toLocaleString('ko-KR');
const PAD = { top: 30, right: 20, bottom: 50, left: 72 };

function setHiDPI(canvas) {
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = canvas.offsetHeight * dpr || 260 * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  return { ctx, w: rect.width, h: canvas.offsetHeight || 260 };
}

// ── 요약 카드 ────────────────────────────────────────────────────
const summaryEl = document.getElementById('summary');
[
  { label: '전체 누적 매출', value: fmt(totalSales) + ' 원', cls: '' },
  { label: '1월 매출', value: fmt(monthlyMap['2026-01'] || 0) + ' 원', cls: 'green' },
  { label: '최고 매출 제품', value: topProduct, cls: 'teal' },
].forEach(({ label, value, cls }) => {
  summaryEl.innerHTML += `
    <div class="stat-card ${cls}">
      <div class="stat-label">${label}</div>
      <div class="stat-value">${value}</div>
    </div>`;
});

// ── 색상 팔레트 ──────────────────────────────────────────────────
const BLUE_PALETTE = ['#1a78c2', '#2196a8', '#1565a0', '#0d8f8f', '#0f4c75', '#3ab0c0'];
const GREEN_PALETTE = ['#1a9c5a', '#2db87d', '#0e7a45', '#27ae60', '#16a085', '#48c774'];

// ── 선 그래프 ────────────────────────────────────────────────────
function drawLine() {
  const canvas = document.getElementById('lineChart');
  canvas.style.height = '260px';
  const { ctx, w, h } = setHiDPI(canvas);

  const chartW = w - PAD.left - PAD.right;
  const chartH = h - PAD.top - PAD.bottom;
  const maxVal = Math.max(...monthlyValues) * 1.15;

  // 그리드
  ctx.strokeStyle = '#e8f4ff';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = PAD.top + chartH - (i / 4) * chartH;
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(PAD.left + chartW, y); ctx.stroke();
    ctx.fillStyle = '#94a3b8';
    ctx.font = '11px Malgun Gothic';
    ctx.textAlign = 'right';
    ctx.fillText(fmt(Math.round(maxVal * i / 4)), PAD.left - 6, y + 4);
  }

  // X축 레이블
  months.forEach((m, i) => {
    const x = PAD.left + (i / (months.length - 1 || 1)) * chartW;
    ctx.fillStyle = '#475569';
    ctx.font = '12px Malgun Gothic';
    ctx.textAlign = 'center';
    ctx.fillText(m.replace('-', '년 ') + '월', x, h - 10);
  });

  // 영역 채우기
  const grad = ctx.createLinearGradient(0, PAD.top, 0, PAD.top + chartH);
  grad.addColorStop(0, 'rgba(26,120,194,0.25)');
  grad.addColorStop(1, 'rgba(26,120,194,0.02)');
  ctx.beginPath();
  months.forEach((m, i) => {
    const x = PAD.left + (i / (months.length - 1 || 1)) * chartW;
    const y = PAD.top + chartH - (monthlyValues[i] / maxVal) * chartH;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.lineTo(PAD.left + chartW, PAD.top + chartH);
  ctx.lineTo(PAD.left, PAD.top + chartH);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // 선
  ctx.beginPath();
  ctx.strokeStyle = '#1a78c2';
  ctx.lineWidth = 3;
  ctx.lineJoin = 'round';
  months.forEach((m, i) => {
    const x = PAD.left + (i / (months.length - 1 || 1)) * chartW;
    const y = PAD.top + chartH - (monthlyValues[i] / maxVal) * chartH;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // 점 + 값 레이블
  months.forEach((m, i) => {
    const x = PAD.left + (i / (months.length - 1 || 1)) * chartW;
    const y = PAD.top + chartH - (monthlyValues[i] / maxVal) * chartH;
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.strokeStyle = '#1a78c2';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    ctx.fillStyle = '#0f4c75';
    ctx.font = 'bold 11px Malgun Gothic';
    ctx.textAlign = 'center';
    ctx.fillText(fmt(monthlyValues[i]) + '원', x, y - 12);
  });

  // 범례
  document.getElementById('lineLegend').innerHTML =
    `<div class="legend-item"><div class="legend-dot" style="background:#1a78c2"></div>월별 총 매출</div>`;
}

// ── 막대 그래프 ──────────────────────────────────────────────────
function drawBar() {
  const canvas = document.getElementById('barChart');
  canvas.style.height = '260px';
  const { ctx, w, h } = setHiDPI(canvas);

  const chartW = w - PAD.left - PAD.right;
  const chartH = h - PAD.top - PAD.bottom;
  const maxVal = Math.max(...productValues) * 1.15;

  const barW = Math.min(54, (chartW / products.length) * 0.6);
  const gap = chartW / products.length;

  // 그리드
  ctx.strokeStyle = '#e8f4ff';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = PAD.top + chartH - (i / 4) * chartH;
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(PAD.left + chartW, y); ctx.stroke();
    ctx.fillStyle = '#94a3b8';
    ctx.font = '11px Malgun Gothic';
    ctx.textAlign = 'right';
    ctx.fillText(fmt(Math.round(maxVal * i / 4)), PAD.left - 6, y + 4);
  }

  // 막대
  products.forEach((p, i) => {
    const barH = (productValues[i] / maxVal) * chartH;
    const x = PAD.left + gap * i + gap / 2 - barW / 2;
    const y = PAD.top + chartH - barH;

    const color = GREEN_PALETTE[i % GREEN_PALETTE.length];
    const grad = ctx.createLinearGradient(0, y, 0, y + barH);
    grad.addColorStop(0, color);
    grad.addColorStop(1, color + '99');

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(x, y, barW, barH, [4, 4, 0, 0]);
    ctx.fill();

    // 값 레이블 (막대 위)
    ctx.fillStyle = '#0f4c75';
    ctx.font = 'bold 10px Malgun Gothic';
    ctx.textAlign = 'center';
    ctx.fillText(fmt(productValues[i]), x + barW / 2, y - 6);

    // X축 레이블
    ctx.fillStyle = '#475569';
    ctx.font = '11px Malgun Gothic';
    ctx.fillText(p, x + barW / 2, h - 10);
  });

  // 범례
  const legendEl = document.getElementById('barLegend');
  legendEl.innerHTML = products.map((p, i) =>
    `<div class="legend-item">
      <div class="legend-rect" style="background:${GREEN_PALETTE[i % GREEN_PALETTE.length]}"></div>${p}
    </div>`
  ).join('');
}

// ── 초기 렌더 + 리사이즈 ─────────────────────────────────────────
function render() { drawLine(); drawBar(); }
window.addEventListener('load', render);
window.addEventListener('resize', render);

(function() {
  const p = location.pathname.split('/').pop() || 'dashboard.html';
  document.querySelectorAll('.page-nav a').forEach(a => {
    a.classList.toggle('active', a.getAttribute('href') === p);
  });
})();
</script>
</body>
</html>
