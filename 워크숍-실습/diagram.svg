<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200" font-family="'Malgun Gothic', 'Segoe UI', sans-serif">

  <!-- 배경 -->
  <rect width="800" height="200" fill="#f8fafc" rx="12"/>

  <!-- 단계 1: 기획 (파스텔 블루) -->
  <rect x="20" y="60" width="120" height="80" rx="16" fill="#d0e8ff" stroke="#7ab8f5" stroke-width="1.5"/>
  <text x="80" y="93" text-anchor="middle" font-size="22" fill="#3a7bd5">📋</text>
  <text x="80" y="116" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a4fa0">기획</text>

  <!-- 화살표 1→2 -->
  <line x1="142" y1="100" x2="168" y2="100" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="168,95 178,100 168,105" fill="#94a3b8"/>

  <!-- 단계 2: 제작 (파스텔 퍼플) -->
  <rect x="180" y="60" width="120" height="80" rx="16" fill="#e8d8ff" stroke="#b48af5" stroke-width="1.5"/>
  <text x="240" y="93" text-anchor="middle" font-size="22" fill="#7c3aed">🛠️</text>
  <text x="240" y="116" text-anchor="middle" font-size="15" font-weight="bold" fill="#5b21b6">제작</text>

  <!-- 화살표 2→3 -->
  <line x1="302" y1="100" x2="328" y2="100" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="328,95 338,100 328,105" fill="#94a3b8"/>

  <!-- 단계 3: 검토 (파스텔 옐로우) -->
  <rect x="340" y="60" width="120" height="80" rx="16" fill="#fff3cc" stroke="#f5c842" stroke-width="1.5"/>
  <text x="400" y="93" text-anchor="middle" font-size="22" fill="#d97706">🔍</text>
  <text x="400" y="116" text-anchor="middle" font-size="15" font-weight="bold" fill="#92400e">검토</text>

  <!-- 화살표 3→4 -->
  <line x1="462" y1="100" x2="488" y2="100" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="488,95 498,100 488,105" fill="#94a3b8"/>

  <!-- 단계 4: 배포 (파스텔 그린) -->
  <rect x="500" y="60" width="120" height="80" rx="16" fill="#ccf5e0" stroke="#5ccc8a" stroke-width="1.5"/>
  <text x="560" y="93" text-anchor="middle" font-size="22" fill="#059669">🚀</text>
  <text x="560" y="116" text-anchor="middle" font-size="15" font-weight="bold" fill="#065f46">배포</text>

  <!-- 화살표 4→5 -->
  <line x1="622" y1="100" x2="648" y2="100" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="648,95 658,100 648,105" fill="#94a3b8"/>

  <!-- 단계 5: 분석 (파스텔 핑크) -->
  <rect x="660" y="60" width="120" height="80" rx="16" fill="#ffe0ec" stroke="#f47ab0" stroke-width="1.5"/>
  <text x="720" y="93" text-anchor="middle" font-size="22" fill="#db2777">📊</text>
  <text x="720" y="116" text-anchor="middle" font-size="15" font-weight="bold" fill="#9d174d">분석</text>

  <!-- 단계 번호 뱃지 -->
  <circle cx="44" cy="68" r="10" fill="#3a7bd5"/>
  <text x="44" y="72" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">1</text>

  <circle cx="204" cy="68" r="10" fill="#7c3aed"/>
  <text x="204" y="72" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">2</text>

  <circle cx="364" cy="68" r="10" fill="#d97706"/>
  <text x="364" y="72" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">3</text>

  <circle cx="524" cy="68" r="10" fill="#059669"/>
  <text x="524" y="72" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">4</text>

  <circle cx="684" cy="68" r="10" fill="#db2777"/>
  <text x="684" y="72" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">5</text>

</svg>
